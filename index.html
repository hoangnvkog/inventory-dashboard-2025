<html lang="vi">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh; color: #e0e0e0;
        }
        .container {max-width: 1440px; margin: 0 auto; padding: 24px;}
        header {text-align: center; padding: 40px 0 32px; margin-bottom: 32px;}
        header h1 {
            font-size: 2.8em; font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #6366f1, #8b5cf6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        header p {font-size: 1.1em; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 3px;}
        .kpi-grid {display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px;}
        .kpi-card {
            background: rgba(255,255,255,0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 24px;
            padding: 28px 24px; text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .kpi-value {font-size: 2.5em; font-weight: 700; background: linear-gradient(135deg, #fff, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
        .kpi-label {font-size: 0.85em; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 2px;}
        .chart-grid {display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 24px; margin-bottom: 32px;}
        .chart-card {background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 28px;}
        .chart-card h3 {color: #a5b4fc; margin-bottom: 20px; font-size: 1.1em; text-transform: uppercase; letter-spacing: 1px;}
        .table-card {background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 28px; overflow: hidden;}
        .table-card h3 {color: #a5b4fc; margin-bottom: 24px; font-size: 1.1em; text-transform: uppercase; letter-spacing: 1px;}
        .table-wrapper {overflow-x: auto; border-radius: 16px;}
        table {width: 100%; border-collapse: collapse; font-size: 0.85em;}
        th {background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.1)); color: #a5b4fc; padding: 16px 12px; text-align: left; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; font-size: 0.75em; border-bottom: 1px solid rgba(99,102,241,0.1);}
        td {padding: 14px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); color: rgba(255,255,255,0.8);}
        tr:hover {background: rgba(99,102,241,0.05);}
        .badge {display: inline-flex; align-items: center; gap: 6px; padding: 5px 14px; border-radius: 20px; font-size: 0.8em; font-weight: 600;}
        .badge::before {content:''; width: 6px; height: 6px; border-radius: 50%; background: currentColor;}
        .badge-success {background: rgba(34,197,94,0.1); color: #4ade80;}
        .badge-warning {background: rgba(251,191,36,0.1); color: #fbbf24;}
        .badge-danger {background: rgba(239,68,68,0.1); color: #f87171;}
        .progress-bar {width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; margin-top: 8px;}
        .progress-fill {height: 100%; background: linear-gradient(90deg, #a78bfa, #6366f1); border-radius: 3px;}
        footer {text-align: center; padding: 40px; color: rgba(255,255,255,0.3); font-size: 0.85em;}
        @media (max-width: 768px) {
            .chart-grid {grid-template-columns: 1fr;}
            header h1 {font-size: 1.8em;}
            th, td {padding: 10px 8px; font-size: 0.8em;}
        }
    </style>
</head>
<body>
    <div class="container">
        <header>

        </div>
        <div class="table-card">
            <h3>📋 Chi Tiết Các Dự Án (23 dự án)</h3>
            <div class="table-wrapper">
                <table>
                    <thead>

                            <th>Trạng Thái</th><th>Ghi Chú</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <footer>Dashboard KIM OANH GROUP | 2025</footer>

n(Trung Quân)", "region": "Bình Dương", "total": 509, "sold": 504, "inventory": 5, "value": 5358190000.0, "status": "success", "note": "- Đang triển khai kinh doanh SẢN PHẨM BÌNH THƯỜNG"}, {"name": "ROYAL TOWN - BÌNH DƯƠNG", "region": "Bình Dương", "total": 22, "sold": 22, "inventory": 0, "value": 0.0, "status": "success", "note": "- Đang triển khai kinh doanh SẢN PHẨM BÌNH THƯỜNG"}, {"name": "NEWLAND - BÌNH DƯƠNG", "region": "Bình Dương", "total": 254, "sold": 251, "inventory": 3, "value": 4570500000.0, "status": "success", "note": "- Đang triển khai kinh doanh SẢN PHẨM BÌNH THƯỜNG"}, {"name": "TRƯỜNG LƯU QUẬN 9 - TP.HCM\n(SINGA CITY)", "region": "TP.HCM", "total": 431, "sold": 425, "inventory": 6, "value": 10572440000.0, "status": "danger", "note": "- Ngưng môi giới sản phẩm"}, {"name": "RICHLAND RESIDENCE\n(THUẬN LỢI 2)", "region": "TP.HCM", "total": 748, "sold": 694, "inventory": 54, "value": 153525935517.5541, "status": "success", "note": "- Đang triển khai kinh doanh SẢN PHẨM BÌNH THƯỜNG"}, {"name": "NHÀ Ở H2 - MP3", "region": "TP.HCM", "total": 8, "sold": 8, "inventory": 0, "value": 0.0, "status": "success", "note": "- Đang triển KD (môi giới lại cho NGUYỄN THỊ NHUNG)"}, {"name": "HÒA LỢI 69 NỀN", "region": "TP.HCM", "total": 8, "sold": 8, "inventory": 0, "value": 0.0, "status": "success", "note": "- Đang triển KD"}]</script>
    
    <script>
        const projectsData = JSON.parse(document.getElementById('project-data').textContent);
        const projects = projectsData.projects || projectsData;
        
        // Calculate KPI
        const totalProjects = projects.length;
        const totalSP = projects.reduce((sum, p) => sum + p.total, 0);
        const soldSP = projects.reduce((sum, p) => sum + p.sold, 0);
        const inventorySP = projects.reduce((sum, p) => sum + p.inventory, 0);
        const totalValue = projects.reduce((sum, p) => sum + p.value, 0);
        
        document.getElementById('kpiSection').innerHTML = `
            <div class="kpi-card">
                <div class="kpi-value">${totalProjects}</div>
                <div class="kpi-label">Tổng Dự Án</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value">${totalSP.toLocaleString()}</div>
                <div class="kpi-label">Tổng SP</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value">${soldSP.toLocaleString()}</div>
                <div class="kpi-label">Đã Bán (${((soldSP/totalSP)*100).toFixed(1)}%)</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value">${inventorySP.toLocaleString()}</div>
                <div class="kpi-label">Tồn Kho (${((inventorySP/totalSP)*100).toFixed(1)}%)</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value">${(totalValue/1000000000).toFixed(0)}</div>
                <div class="kpi-label">Tổng GT (Tỷ)</div>
            </div>
        `;

        // Fill table
        const tableBody = document.getElementById('tableBody');
        projects.forEach((project, index) => {
            const row = document.createElement('tr');
            const saleRate = project.total > 0 ? ((project.sold / project.total) * 100).toFixed(1) : 0;
            const statusMap = {
                'success': {class: 'badge-success', text: 'Bình thường'},
                'warning': {class: 'badge-warning', text: 'Cần xử lý'},
                'danger': {class: 'badge-danger', text: 'Khẩn cấp'}
            };
            const status = statusMap[project.status] || statusMap['success'];
            
            row.innerHTML = `
                <td><strong>${index + 1}</strong></td>
                <td><strong>${project.name}</strong></td>
                <td>${project.region}</td>
                <td>${project.total.toLocaleString()}</td>
                <td>${project.sold.toLocaleString()}</td>
                <td><strong style="color: #fbbf24;">${project.inventory.toLocaleString()}</strong></td>
                <td>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span>${saleRate}%</span>
                        <div class="progress-bar" style="width: 100px; flex-shrink: 0;">
                            <div class="progress-fill" style="width: ${saleRate}%"></div>
                        </div>
                    </div>
                </td>
                <td>${(project.value / 1000000000).toFixed(1)} tỷ</td>
                <td><span class="badge ${status.class}">${status.text}</span></td>
                <td>${project.note}</td>
            `;
            tableBody.appendChild(row);
        });

        // Chart 1: Region distribution
        const regionCounts = {};
        projects.forEach(p => { regionCounts[p.region] = (regionCounts[p.region] || 0) + 1; });
        const ctx1 = document.getElementById('regionChart').getContext('2d');
        new Chart(ctx1, {
            type: 'doughnut',
            data: {
                labels: Object.keys(regionCounts),
                datasets: [{
                    data: Object.values(regionCounts),
                    backgroundColor: ['rgba(167, 139, 250, 0.8)', 'rgba(99, 102, 241, 0.8)', 'rgba(251, 191, 36, 0.8)'],
                    borderColor: ['rgba(167, 139, 250, 1)', 'rgba(99, 102, 241, 1)', 'rgba(251, 191, 36, 1)'],
                    borderWidth: 2
                }]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: 'rgba(255,255,255,0.7)' } } } }
        });

        // Chart 2: Top projects by inventory
        const sortedProjects = [...projects].sort((a, b) => b.inventory - a.inventory);
        const ctx2 = document.getElementById('topProjectsChart').getContext('2d');
        new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: sortedProjects.slice(0, 10).map(p => p.name.split(' - ')[0].substring(0, 20)),
                datasets: [{
                    label: 'SP Tồn Kho',
                    data: sortedProjects.slice(0, 10).map(p => p.inventory),
                    backgroundColor: 'rgba(99, 102, 241, 0.6)',
                    borderColor: 'rgba(99, 102, 241, 1)',
                    borderWidth: 1
                }]
            },
            options: { responsive: true, indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.6)' } }, y: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.7)' } } } }
        });
    </script>
</body>
